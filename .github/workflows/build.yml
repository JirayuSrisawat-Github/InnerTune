name: Build debug APK
on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    paths-ignore:
      - 'README.md'
      - 'fastlane/**'
      - 'assets/**'
      - '.github/**/*.md'
      - '.github/FUNDING.yml'
      - '.github/ISSUE_TEMPLATE/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Decode google-services.json
        run: echo ${{ secrets.DEBUG_GOOGLE_SERVICES }} | base64 -d >> app/src/debug/google-services.json

      - name: Decode Keystore
        run: echo ${{ secrets.DEBUG_KEYSTORE }} | base64 -d >> app/music-debug.jks

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: "zulu"
          cache: 'gradle'

      - name: Build debug APK and run jvm tests
        run: ./gradlew assembleDebug lintFullDebug testFullDebugUnitTest --stacktrace -DskipFormatKtlint
        env:
          MUSIC_KEYSTORE_FILE: 'music-debug.jks'
          MUSIC_SINGING_KEY_ALIAS: ${{ secrets.DEBUG_SINGING_KEY_ALIAS }}
          MUSIC_SIGNING_STORE_PASSWORD: ${{ secrets.DEBUG_SIGNING_STORE_PASSWORD }}
          MUSIC_SIGNING_KEY_PASSWORD: ${{ secrets.DEBUG_SIGNING_KEY_PASSWORD }}

      - name: Publish to Maven Repository
        run: ./gradlew publishApkFullDebugPublicationToCentralRepository publishApkFossDebugPublicationToCentralRepository --stacktrace
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          COMMIT_SHA: ${{ github.sha }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: app/build/outputs/apk/full/debug/*.apk